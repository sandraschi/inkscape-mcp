# inkscape-mcp Docker + optional monitoring stack.
#
# MCP only:
#   docker compose up inkscape-mcp
#
# MCP + Prometheus/Grafana/Loki:
#   docker compose --profile monitoring up -d
#
# Note: Inkscape GUI (Hands-In) runs on the HOST, not in this container.

services:
  inkscape-mcp:
    build:
      context: .
      target: production
    image: ghcr.io/sandraschi/inkscape-mcp:latest
    container_name: inkscape-mcp
    ports:
      - "10900:10900"
      - "9074:9074"
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "10900"
      MCP_TRANSPORT: http
      INKSCAPE_MCP_METRICS_ENABLED: "true"
      PROMETHEUS_PORT: "9074"
      INKSCAPE_MCP_LOG_FORMAT: json
      INKSCAPE_MCP_LOG_LEVEL: INFO
    volumes:
      - inkscape-mcp-logs:/app/logs
    labels:
      promtail.job: inkscape-mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:10900/api/health', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:v3.11.3
    container_name: inkscape-mcp-prometheus
    ports:
      - "9092:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:3.7.1
    container_name: inkscape-mcp-loki
    ports:
      - "3102:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:3.7.1
    container_name: inkscape-mcp-promtail
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - inkscape-mcp-logs:/app/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:13.0.1
    container_name: inkscape-mcp-grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

volumes:
  inkscape-mcp-logs:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  default:
    name: inkscape-mcp-net
