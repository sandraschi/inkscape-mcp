name: MCPB pack

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  pack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync project
        run: uv sync

      - name: Build MCPB
        run: uv run python tools/pack_mcpb.py

      - uses: actions/upload-artifact@v4
        with:
          name: inkscape-mcp-mcpb
          path: dist/*.mcpb
          if-no-files-found: error
